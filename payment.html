<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 500px; 
            margin: auto; 
            border: 1px solid #ddd; 
            margin-top: 50px; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0 15px 0; 
            box-sizing: border-box;
        }
        .error-message {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 16px;
        }
    </style>
</head>
<body>
    <h2>Payment Details</h2>
    <hr>
    
    <h4>Option 1: Credit Card</h4>
    <input type="text" id="cardNumber" placeholder="Card Number (16 digits)">
    <input type="text" id="expiry" placeholder="Expiry (MM/YY)" style="width: 45%; display: inline-block;">
    <input type="text" id="cvv" placeholder="CVV" style="width: 45%; float: right;">
    
    <div style="clear: both;"></div>
    
    <h4>Option 2: UPI Payment</h4>
    <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. user@okaxis)">
    
    <div id="error-msg" class="error-message"></div>
    
    <button style="width: 100%; background: black; color: white; padding: 15px; border: none; cursor: pointer;" onclick="validatePayment()">Pay Now</button>
    <button style="width: 100%; background: #eee; color: black; padding: 15px; margin-top: 10px; border: none; cursor: pointer;" onclick="location.href='index.html'">Cancel</button>

    <script>
        function validatePayment() {
            const cardNumber = document.getElementById("cardNumber").value.trim();
            const expiry = document.getElementById("expiry").value.trim();
            const cvv = document.getElementById("cvv").value.trim();
            const upiId = document.getElementById("upiId").value.trim();
            const errorElement = document.getElementById("error-msg");

            errorElement.innerText = "";

            if (!cardNumber && !expiry && !cvv && !upiId) {
                errorElement.innerText = "Please enter either Credit Card details or a UPI ID.";
                return;
            }

            if (cardNumber || expiry || cvv) {
                const cardRegex = /^\d{16}$/;
                if (!cardRegex.test(cardNumber.replace(/\s+/g, ''))) {
                    errorElement.innerText = "Please enter a valid 16-digit Card Number.";
                    return;
                }

                const expiryRegex = /^(0[1-9]|1[0-2])\/\d{2}$/;
                if (!expiryRegex.test(expiry)) {
                    errorElement.innerText = "Please enter a valid Expiry Date (MM/YY).";
                    return;
                }

                const cvvRegex = /^\d{3,4}$/;
                if (!cvvRegex.test(cvv)) {
                    errorElement.innerText = "Please enter a valid 3 or 4 digit CVV.";
                    return;
                }
            } else if (upiId) {
                const upiRegex = /^[a-zA-Z0-9.\-_]{2,256}@[a-zA-Z]{2,64}$/;
                if (!upiRegex.test(upiId)) {
                    errorElement.innerText = "Please enter a valid UPI ID (e.g., user@okaxis).";
                    return;
                }
            }

            window.location.href = 'ordercon.html';
        }
    </script>
</body>
</html>

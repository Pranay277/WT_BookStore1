<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; border: 1px solid #ddd; margin-top: 50px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; }
    </style>
</head>
<body>
    <h2>Payment Details</h2>
    <hr>
    <h4>Option 1: Credit Card</h4>
    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Expiry (MM/YY)" style="width: 45%;">
    <input type="text" placeholder="CVV" style="width: 45%; float: right;">
    
    <h4>Option 2: UPI Payment</h4>
    <input type="text" placeholder="Enter UPI ID (e.g. user@okaxis)">
    
    <button style="width: 100%; background: black; color: white; padding: 15px;" onclick="location.href='ordercon.html'">Pay Now</button>
</body>
</html>

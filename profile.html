<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        .profile-box { 
            border: 1px solid black; 
            padding: 20px; 
            max-width: 500px; 
            margin-bottom: 20px;
        }

      
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        table, th, td {
            border: 1px solid black; 
        }
        th, td { 
            padding: 10px; 
            text-align: left;
        }

        .btn { 
            padding: 8px 15px; 
            cursor: pointer; 
            border: 1px solid black;
            background-color: #28a745;
           
        }
    </style>
</head>
<body>
    
    <h1>My Profile</h1>
    
    <div class="profile-box">
        <h3>Personal Details</h3>
        <table style="margin-bottom: 20px;">
            <tr>
                <td><b>Name:</b></td>
                <td>Pranay</td>
            </tr>
            <tr>
                <td><b>Email:</b></td>
                <td>gpranay@gmail.com</td>
            </tr>
            <tr>
                <td><b>Phone Number:</b></td>
                <td> 9885880244</td>
            </tr>
            <tr>
                <td><b>Address:</b></td>
                <td> 123 main street hyderabad</td>
            </tr>
            <tr>
                <td><b>Total Orders:</b></td>
                <td>0</td>
            </tr>
        </table>
        
        <button class="btn" onclick="location.href='#'">Edit Profile</button>
        <button class="btn" onclick="location.href='login.html'">Logout</button>
        <button class="btn" onclick="location.href='index.html'" style="margin-left: 200px;">Back to Home</button>
    </div>

    <div class="profile-box">
        <h3>Order History</h3>
        <table>
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Total Amount</th>
                <th>Status</th>
            </tr>
            <tr>
                <td colspan="4" style="text-align: center; color: gray;"><i>No past orders to display</i></td>
            </tr>
        </table>
    </div>

</body>
</html>

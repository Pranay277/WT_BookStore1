<!DOCTYPE html>
<html>
<head>
    <title>Login & Sign Up | Book Store</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: sans-serif; 
            background: #eee; 
            gap: 40px;
            margin: 0;
            padding: 40px 0;
        }
        .box { 
            background: white; 
            padding: 30px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            width: 300px; 
        }
        input { 
            width: 100%; 
            padding: 8px; 
            margin: 10px 0; 
            box-sizing: border-box;
        }
        .btn { 
            width: 100%; 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover {
            background: #218838;
        }
        .error-message {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-top: 5px;
            min-height: 16px;
        }
    </style>
</head>
<body>
    
    <div class="box">
        <center><h2>Login</h2></center>
        
        <label>Username:</label>
        <input type="text" id="username" placeholder="Enter Username">
        
        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
        
        <div id="error-msg" class="error-message"></div>
        
        <button class="btn" onclick="validateLogin()">Login</button>

        <p style="text-align: center; margin-top: 15px;"><a href="SignUp.html">Sign Up</a></p>
    </div>

    <script>
        function validateLogin() {
            const usernameValue = document.getElementById("username").value.trim();
            const passwordValue = document.getElementById("password").value.trim();
            const errorElement = document.getElementById("error-msg");

            errorElement.innerText = "";

            if (usernameValue === "") {
                errorElement.innerText = "Please enter your username.";
                return;
            }

            if (passwordValue === "") {
                errorElement.innerText = "Please enter your password.";
                return;
            }

            if (passwordValue.length < 6) {
                errorElement.innerText = "Password must be at least 6 characters.";
                return;
            }

            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
